<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>

// Elements

const qrInput = document.getElementById("qrInput");
const qrcodeDiv = document.getElementById("qrcode");

let qr;

// Generate QR

function generateQR(){

qrcodeDiv.innerHTML = "";

let value = qrInput.value.trim();

if(value===""){

qrcodeDiv.innerHTML="QR PREVIEW";
return;

}

qr = new QRCode(qrcodeDiv,{
text:value,
width:300,
height:300,
colorDark:document.getElementById("fgColor").value,
colorLight:document.getElementById("bgColor").value,
correctLevel:QRCode.CorrectLevel.H
});

}

// Live Generate

qrInput.addEventListener("keyup",generateQR);

document.getElementById("fgColor")
.addEventListener("input",generateQR);

document.getElementById("bgColor")
.addEventListener("input",generateQR);

// Generate default

generateQR();



// Copy Text

document.querySelector(".copy-btn")
.addEventListener("click",()=>{

navigator.clipboard.writeText(qrInput.value);

alert("Copied!");

});



// Share

document.querySelector(".share-btn")
.addEventListener("click",()=>{

if(navigator.share){

navigator.share({

title:"OS Line QR Code",

text:qrInput.value

});

}
else{

alert("Sharing not supported");

}

});



// Download PNG

document.querySelector(".download-btn")
.addEventListener("click",()=>{

let img = qrcodeDiv.querySelector("img");

if(!img){

alert("Generate QR first");

return;

}

let a = document.createElement("a");

a.href = img.src;

a.download = "OSLine-QRCode.png";

a.click();

});

</script>
