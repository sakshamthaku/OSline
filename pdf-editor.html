<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Line PDF Editor BETA VERSON </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            height: 60px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .header-left span:first-child {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-center {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-center button {
            background: #0f3460;
            border: 1px solid #533483;
            color: #fff;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .header-center button:hover {
            background: #1a4d7a;
            border-color: #7c3aed;
        }
        
        .header-center input {
            width: 50px;
            background: #0f3460;
            border: 1px solid #533483;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
        }
        
        .header-right {
            display: flex;
            gap: 10px;
        }
        
        .btn-back, .btn-download {
            background: #0f3460;
            border: 1px solid #533483;
            color: #fff;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        
        .btn-download {
            background: #7c3aed;
            border-color: #7c3aed;
        }
        
        .btn-download:hover {
            background: #6d28d9;
            transform: scale(1.05);
        }
        
        .container {
            display: flex;
            height: calc(100vh - 60px);
            overflow: hidden;
        }
        
        .sidebar-left {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
            padding: 15px;
        }
        
        .sidebar-section {
            margin-bottom: 25px;
        }
        
        .sidebar-title {
            color: #a78bfa;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .tool-btn {
            width: 100%;
            background: #0f3460;
            border: 1px solid #533483;
            color: #fff;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .tool-btn:hover {
            background: #1a4d7a;
            border-color: #7c3aed;
        }
        
        .tool-btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }
        
        .tool-icon {
            font-size: 16px;
            min-width: 20px;
        }
        
        .text-options {
            background: #0f3460;
            border: 1px solid #533483;
            border-radius: 6px;
            padding: 12px;
            margin-top: 10px;
        }
        
        .option-label {
            font-size: 12px;
            color: #a78bfa;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .option-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .option-row input, .option-row select {
            flex: 1;
            background: #1a4d7a;
            border: 1px solid #533483;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .option-row select {
            cursor: pointer;
        }
        
        .format-btns {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }
        
        .format-btn {
            flex: 1;
            background: #1a4d7a;
            border: 1px solid #533483;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .format-btn:hover {
            background: #2a5d8a;
            border-color: #7c3aed;
        }
        
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f3460;
            position: relative;
            overflow: hidden;
        }
        
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            overflow: auto;
            position: relative;
            padding: 20px;
        }
        
        .pdf-canvas {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: white;
            max-width: 100%;
            max-height: 100%;
        }
        
        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .text-editor-box {
            position: absolute;
            background: rgba(124, 58, 237, 0.1);
            border: 2px dashed #7c3aed;
            cursor: move;
            padding: 4px;
            z-index: 100;
        }
        
        .text-editor-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #000;
            padding: 4px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: Arial, sans-serif;
        }
        
        .sidebar-right {
            width: 140px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            overflow-y: auto;
            padding: 10px;
        }
        
        .pages-title {
            color: #a78bfa;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .page-thumbnail {
            width: 100%;
            aspect-ratio: 0.7;
            background: #0f3460;
            border: 2px solid #533483;
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .page-thumbnail:hover {
            border-color: #7c3aed;
            transform: scale(1.02);
        }
        
        .page-thumbnail.active {
            border-color: #7c3aed;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }
        
        .page-thumbnail canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .page-num {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 2px 4px;
            border-radius: 2px;
        }
        
        .add-page-btn {
            width: 100%;
            padding: 30px 10px;
            background: #0f3460;
            border: 2px dashed #533483;
            color: #a78bfa;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .add-page-btn:hover {
            border-color: #7c3aed;
            color: #7c3aed;
            background: rgba(124, 58, 237, 0.1);
        }
        
        .upload-placeholder {
            color: #7c3aed;
            text-align: center;
        }
        
        .upload-placeholder-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .upload-placeholder-text {
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        #pdfUpload {
            display: none;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #16213e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #533483;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #7c3aed;
        }

        .status-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #7c3aed;
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
    <div style="
background:rgba(245,158,11,.15);
border:1px solid #f59e0b;
color:#fbbf24;
padding:12px;
text-align:center;
font-size:14px;">
⚠ PDF Editor Pro is currently in Beta. Some features may contain bugs and are actively being improved.
</div>
<body>
    <div class="header-left">
    <span>OS Line</span>

    <div style="display:flex;align-items:center;gap:10px;">
        <span style="-webkit-text-fill-color: unset; color:#fff; font-size:16px;">
            PDF Editor Pro
        </span>

        <span style="
        background:#f59e0b;
        color:black;
        padding:4px 10px;
        border-radius:20px;
        font-size:11px;
        font-weight:bold;
        ">
        BETA
        </span>
    </div>
</div>
        <div class="header-center" id="toolbar" style="display: none;">
            <button onclick="app.firstPage()" title="First page">⏮</button>
            <button onclick="app.prevPage()" title="Previous page">‹</button>
            <input type="number" id="pageInput" value="1" min="1" onchange="app.goToPage(this.value)">
            <span id="totalPages" style="min-width: 30px;">/ 1</span>
            <button onclick="app.nextPage()" title="Next page">›</button>
            <button onclick="app.lastPage()" title="Last page">⏭</button>
            <button onclick="app.zoomOut()" title="Zoom out">−</button>
            <span id="zoomLevel" style="min-width: 40px; text-align: center;">100%</span>
            <button onclick="app.zoomIn()" title="Zoom in">+</button>
        </div>
        <div class="header-right">
            <button class="btn-download" id="downloadBtn" onclick="app.downloadPDF()" style="display: none;">⬇ Download PDF</button>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar-left">
            <div class="sidebar-section">
                <div class="sidebar-title">Tools</div>
                <button class="tool-btn" onclick="app.selectTool('text')">
                    <span class="tool-icon">T</span>
                    <span>Add Text</span>
                </button>
                <button class="tool-btn" onclick="app.selectTool('watermark')">
                    <span class="tool-icon">💧</span>
                    <span>Add Watermark</span>
                </button>
                <button class="tool-btn" onclick="app.selectTool('rotate')">
                    <span class="tool-icon">⟲</span>
                    <span>Rotate Pages</span>
                </button>
                <button class="tool-btn" onclick="app.selectTool('delete')">
                    <span class="tool-icon">🗑</span>
                    <span>Delete Pages</span>
                </button>
                <button class="tool-btn" onclick="app.selectTool('reorder')">
                    <span class="tool-icon">↕</span>
                    <span>Reorder Pages</span>
                </button>
            </div>
            
            <div class="sidebar-section" id="textOptionsSection" style="display: none;">
                <div class="sidebar-title">Text Options</div>
                <div class="text-options">
                    <div class="option-label">Font</div>
                    <select id="fontFamily" onchange="app.updateTextOptions()">
                        <option>Helvetica</option>
                        <option>Times</option>
                        <option>Courier</option>
                        <option>Arial</option>
                    </select>
                    
                    <div class="option-label" style="margin-top: 10px;">Size</div>
                    <div class="option-row">
                        <input type="number" id="fontSize" value="14" min="8" max="72" onchange="app.updateTextOptions()">
                        <input type="color" id="fontColor" value="#000000" onchange="app.updateTextOptions()">
                    </div>
                    
                    <div class="format-btns">
                        <button class="format-btn" style="font-weight: bold;">B</button>
                        <button class="format-btn" style="font-style: italic;">I</button>
                        <button class="format-btn" style="text-decoration: underline;">U</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-area">
            <div class="canvas-area" id="canvasArea">
                <div class="upload-placeholder">
                    <div class="upload-placeholder-icon">📄</div>
                    <div class="upload-placeholder-text">Upload a PDF to start editing</div>
                    <button class="btn-download" onclick="app.triggerUpload()" style="margin-top: 10px;">Choose PDF File</button>
                </div>
            </div>
        </div>
        
        <div class="sidebar-right">
            <div class="pages-title">Pages</div>
            <div id="thumbnailsContainer"></div>
            <button class="add-page-btn" id="addPdfBtn" onclick="app.triggerUpload()" style="display: none;">+ Add PDF</button>
        </div>
    </div>
    
    <input type="file" id="pdfUpload" accept=".pdf" onchange="app.handleFileUpload(event)">
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const PDFDocument = PDFLib.PDFDocument;
        const rgb = PDFLib.rgb;
        const degrees = PDFLib.degrees;
        
        const app = {
            pdf: null,
            pdfDoc: null,
            originalPdfDoc: null,
            currentPage: 1,
            zoom: 1,
            selectedTool: null,
            pageRotations: {},
            pageTexts: {},
            pageWatermarks: {},
            pageOrder: [],
            
            triggerUpload() {
                document.getElementById('pdfUpload').click();
            },
            
            async handleFileUpload(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                try {
                    this.showStatus('Loading PDF...');
                    const arrayBuffer = await file.arrayBuffer();
                    
                    this.originalPdfDoc = await PDFDocument.load(arrayBuffer);
                    this.pdfDoc = await PDFDocument.load(arrayBuffer);
                    this.pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    
                    this.currentPage = 1;
                    this.zoom = 1;
                    this.pageRotations = {};
                    this.pageTexts = {};
                    this.pageWatermarks = {};
                    this.pageOrder = Array.from({length: this.pdf.numPages}, (_, i) => i + 1);
                    
                    document.getElementById('toolbar').style.display = 'flex';
                    document.getElementById('downloadBtn').style.display = 'flex';
                    document.getElementById('addPdfBtn').style.display = 'block';
                    
                    this.renderPage();
                    this.updateThumbnails();
                    this.updatePageNumbers();
                    
                    this.showStatus('PDF loaded successfully!');
                    event.target.value = '';
                } catch (error) {
                    console.error('Error loading PDF:', error);
                    this.showStatus('Error loading PDF. Please try again.');
                }
            },
            
            async renderPage() {
                if (!this.pdf) return;
                
                try {
                    const page = await this.pdf.getPage(this.currentPage);
                    const viewport = page.getViewport({ scale: this.zoom });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    canvas.className = 'pdf-canvas';
                    
                    await page.render({ canvasContext: context, viewport }).promise;
                    
                    const canvasArea = document.getElementById('canvasArea');
                    canvasArea.innerHTML = '';
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'canvas-wrapper';
                    wrapper.appendChild(canvas);
                    
                    this.currentCanvas = canvas;
                    this.canvasWrapper = wrapper;
                    canvasArea.appendChild(wrapper);
                    
                    document.getElementById('pageInput').value = this.currentPage;
                    document.getElementById('totalPages').textContent = `/ ${this.pdf.numPages}`;
                } catch (error) {
                    console.error('Error rendering page:', error);
                }
            },
            
            async updateThumbnails() {
                if (!this.pdf) return;
                
                const container = document.getElementById('thumbnailsContainer');
                container.innerHTML = '';
                
                for (let i = 1; i <= this.pdf.numPages; i++) {
                    try {
                        const page = await this.pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 0.3 });
                        
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        
                        await page.render({ canvasContext: context, viewport }).promise;
                        
                        const thumb = document.createElement('div');
                        thumb.className = 'page-thumbnail' + (i === this.currentPage ? ' active' : '');
                        thumb.draggable = true;
                        thumb.dataset.page = i;
                        thumb.onclick = () => {
                            this.currentPage = i;
                            this.renderPage();
                            this.updateThumbnails();
                        };
                        
                        // Drag and drop for reordering
                        thumb.ondragstart = (e) => {
                            e.dataTransfer.effectAllowed = 'move';
                            e.dataTransfer.setData('text/plain', i);
                        };
                        
                        thumb.ondragover = (e) => {
                            e.preventDefault();
                            e.dataTransfer.dropEffect = 'move';
                            thumb.style.borderColor = '#7c3aed';
                        };
                        
                        thumb.ondragleave = () => {
                            thumb.style.borderColor = '#533483';
                        };
                        
                        thumb.ondrop = (e) => {
                            e.preventDefault();
                            const draggedPage = parseInt(e.dataTransfer.getData('text/plain'));
                            if (draggedPage !== i) {
                                this.reorderPages(draggedPage, i);
                            }
                            thumb.style.borderColor = '#533483';
                        };
                        
                        thumb.appendChild(canvas);
                        thumb.innerHTML += `<div class="page-num">${i}</div>`;
                        
                        container.appendChild(thumb);
                    } catch (error) {
                        console.error('Error rendering thumbnail:', error);
                    }
                }
            },
            
            selectTool(tool) {
                this.selectedTool = tool;
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                event.target.closest('.tool-btn').classList.add('active');
                
                const textSection = document.getElementById('textOptionsSection');
                if (tool === 'text') {
                    textSection.style.display = 'block';
                    this.enableTextMode();
                } else {
                    textSection.style.display = 'none';
                    if (this.canvasWrapper) {
                        this.canvasWrapper.style.cursor = 'default';
                    }
                    
                    if (tool === 'watermark') {
                        this.addWatermark();
                    } else if (tool === 'rotate') {
                        this.rotatePage();
                    } else if (tool === 'delete') {
                        this.deletePage();
                    } else if (tool === 'reorder') {
                        this.showStatus('Drag page thumbnails to reorder');
                    }
                }
            },
            
            enableTextMode() {
                if (!this.canvasWrapper) return;
                
                this.canvasWrapper.style.cursor = 'crosshair';
                
                // Remove previous click handler if exists
                const oldWrapper = this.canvasWrapper;
                const newWrapper = oldWrapper.cloneNode(true);
                oldWrapper.parentNode.replaceChild(newWrapper, oldWrapper);
                this.canvasWrapper = newWrapper;
                
                newWrapper.onclick = (e) => {
                    const rect = newWrapper.querySelector('canvas').getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const textBox = document.createElement('div');
                    textBox.className = 'text-editor-box';
                    textBox.style.left = x + 'px';
                    textBox.style.top = y + 'px';
                    textBox.style.width = '150px';
                    textBox.style.height = '30px';
                    
                    const input = document.createElement('textarea');
                    input.className = 'text-editor-input';
                    input.placeholder = 'Type text...';
                    input.style.fontSize = document.getElementById('fontSize').value + 'px';
                    
                    input.onblur = () => {
                        if (input.value.trim()) {
                            this.saveText(this.currentPage, x, y, input.value);
                            this.showStatus('Text added successfully!');
                        }
                        textBox.remove();
                    };
                    
                    input.onkeydown = (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            input.blur();
                        }
                    };
                    
                    textBox.appendChild(input);
                    newWrapper.appendChild(textBox);
                    input.focus();
                };
            },
            
            saveText(pageNum, x, y, text) {
                if (!this.pageTexts[pageNum]) this.pageTexts[pageNum] = [];
                this.pageTexts[pageNum].push({
                    x,
                    y,
                    text,
                    font: document.getElementById('fontFamily').value,
                    size: parseInt(document.getElementById('fontSize').value),
                    color: document.getElementById('fontColor').value
                });
            },
            
            async addWatermark() {
                const text = prompt('Enter watermark text:');
                if (!text) return;
                
                this.pageWatermarks[this.currentPage] = text;
                this.showStatus('Watermark added to page ' + this.currentPage);
            },
            
            rotatePage() {
                const options = ['90°', '180°', '270°', 'Cancel'];
                const response = prompt('Rotate page (enter degrees):\n90\n180\n270', '90');
                
                if (response && ['90', '180', '270'].includes(response)) {
                    const degrees = parseInt(response);
                    this.pageRotations[this.currentPage] = (this.pageRotations[this.currentPage] || 0) + degrees;
                    this.showStatus('Page rotated by ' + degrees + '°');
                } else if (response !== null) {
                    this.showStatus('Invalid rotation value');
                }
            },
            
            deletePage() {
                if (this.pdf.numPages <= 1) {
                    this.showStatus('Cannot delete the last page');
                    return;
                }
                
                if (confirm(`Delete page ${this.currentPage}? This action cannot be undone.`)) {
                    const newPages = [];
                    for (let i = 1; i <= this.pdfDoc.getPageCount(); i++) {
                        if (i !== this.currentPage) {
                            newPages.push(this.pdfDoc.getPage(i - 1));
                        }
                    }
                    
                    this.pageOrder = this.pageOrder.filter(p => p !== this.currentPage);
                    if (this.currentPage > this.pdf.numPages - 1) this.currentPage--;
                    
                    this.showStatus('Page ' + this.currentPage + ' deleted');
                    this.renderPage();
                    this.updateThumbnails();
                }
            },
            
            reorderPages(fromPage, toPage) {
                const fromIndex = this.pageOrder.indexOf(fromPage);
                const toIndex = this.pageOrder.indexOf(toPage);
                
                if (fromIndex > -1 && toIndex > -1) {
                    this.pageOrder.splice(fromIndex, 1);
                    this.pageOrder.splice(toIndex, 0, fromPage);
                    this.updateThumbnails();
                    this.showStatus('Pages reordered');
                }
            },
            
            updateTextOptions() {
                // Updates are applied when text is added
            },
            
            nextPage() {
                if (this.currentPage < this.pdf.numPages) {
                    this.currentPage++;
                    this.renderPage();
                    this.updateThumbnails();
                }
            },
            
            prevPage() {
                if (this.currentPage > 1) {
                    this.currentPage--;
                    this.renderPage();
                    this.updateThumbnails();
                }
            },
            
            firstPage() {
                this.currentPage = 1;
                this.renderPage();
                this.updateThumbnails();
            },
            
            lastPage() {
                this.currentPage = this.pdf.numPages;
                this.renderPage();
                this.updateThumbnails();
            },
            
            goToPage(pageNum) {
                const num = parseInt(pageNum);
                if (num >= 1 && num <= this.pdf.numPages) {
                    this.currentPage = num;
                    this.renderPage();
                    this.updateThumbnails();
                }
            },
            
            zoomIn() {
                this.zoom = Math.min(this.zoom + 0.1, 3);
                document.getElementById('zoomLevel').textContent = Math.round(this.zoom * 100) + '%';
                this.renderPage();
            },
            
            zoomOut() {
                this.zoom = Math.max(this.zoom - 0.1, 0.5);
                document.getElementById('zoomLevel').textContent = Math.round(this.zoom * 100) + '%';
                this.renderPage();
            },
            
            updatePageNumbers() {
                if (this.pdf) {
                    document.getElementById('pageInput').max = this.pdf.numPages;
                }
            },
            
            async downloadPDF() {
                if (!this.pdfDoc) return;
                
                try {
                    this.showStatus('Generating PDF...');
                    
                    const newPdf = await PDFDocument.create();
                    const pages = this.pdfDoc.getPages();
                    
                    for (let i = 0; i < pages.length; i++) {
                        const page = pages[i];
                        const pageNum = i + 1;
                        
                        // Apply rotations
                        if (this.pageRotations[pageNum]) {
                            const rotation = this.pageRotations[pageNum];
                            page.setRotation(degrees(rotation % 360));
                        }
                    }
                    
                    // Add texts and watermarks
                    for (let i = 0; i < pages.length; i++) {
                        const pageNum = i + 1;
                        const page = pages[i];
                        
                        // Add text
                        if (this.pageTexts[pageNum]) {
                            for (const textData of this.pageTexts[pageNum]) {
                                try {
                                    const fontName = textData.font === 'Times' ? PDFLib.StandardFonts.TimesRoman :
                                                    textData.font === 'Courier' ? PDFLib.StandardFonts.Courier :
                                                    textData.font === 'Arial' ? PDFLib.StandardFonts.Helvetica :
                                                    PDFLib.StandardFonts.Helvetica;
                                    
                                    page.drawText(textData.text, {
                                        x: textData.x,
                                        y: page.getHeight() - textData.y - textData.size,
                                        size: textData.size,
                                        font: fontName,
                                        color: this.hexToRgb(textData.color)
                                    });
                                } catch (error) {
                                    console.error('Error adding text:', error);
                                }
                            }
                        }
                        
                        // Add watermark
                        if (this.pageWatermarks[pageNum]) {
                            page.drawText(this.pageWatermarks[pageNum], {
                                x: 50,
                                y: page.getHeight() - 100,
                                size: 40,
                                color: rgb(0.85, 0.85, 0.85),
                                opacity: 0.3,
                                rotate: degrees(-45)
                            });
                        }
                    }
                    
                    const pdfBytes = await this.pdfDoc.save();
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'osline-edited-' + new Date().getTime() + '.pdf';
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    this.showStatus('PDF downloaded successfully!');
                } catch (error) {
                    console.error('Error downloading PDF:', error);
                    this.showStatus('Error downloading PDF. Try again.');
                }
            },
            
            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? rgb(
                    parseInt(result[1], 16) / 255,
                    parseInt(result[2], 16) / 255,
                    parseInt(result[3], 16) / 255
                ) : rgb(0, 0, 0);
            },
            
            showStatus(message) {
                const msg = document.createElement('div');
                msg.className = 'status-message';
                msg.textContent = message;
                document.body.appendChild(msg);
                
                setTimeout(() => {
                    msg.remove();
                }, 3000);
            }
        };
    </script>
</body>
